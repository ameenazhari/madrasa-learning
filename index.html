<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Arabic Full Workbook - Ameen Azhari</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none; }
            body { background: white; }
            .page { 
                page-break-after: always; 
                margin: 0 !important; 
                border: none !important;
                box-shadow: none !important;
                height: 100vh;
            }
        }
        body { 
            font-family: 'Amiri', serif; 
            direction: rtl; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
            background: #f4f7f6; 
        }
        .page {
            background: white;
            width: 210mm;
            min-height: 296mm;
            margin: 30px auto;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative;
        }
        .header-name {
            text-align: left; font-size: 13px; color: #999;
            font-family: sans-serif; margin-bottom: 15px;
        }
        .main-letter {
            font-size: 170px; color: #d32f2f; margin: 0; line-height: 1.1;
        }
        .trace-section {
            border: 2px dashed #eee; background: #fafafa;
            padding: 20px; border-radius: 15px; margin: 15px 0;
        }
        .dotted { font-size: 85px; color: #e0e0e0; letter-spacing: 30px; }
        .grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 20px; margin-top: 10px; flex-grow: 1;
        }
        .card {
            border: 1px solid #f0f0f0; border-radius: 15px;
            padding: 15px; background: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .label { 
            font-size: 50px; color: #1e88e5; background: #e3f2fd; 
            width: 100%; border-radius: 10px; margin-bottom: 10px;
        }
        .emoji { font-size: 55px; }
        .word { font-size: 35px; font-weight: bold; }
        .lines { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .line { height: 45px; border-bottom: 2px solid #333; margin: 12px 0; }
        
        .summary-table {
            width: 100%; border-collapse: collapse; margin-top: 20px;
            direction: ltr; font-family: sans-serif;
        }
        .summary-table th, .summary-table td {
            border: 1px solid #ddd; padding: 12px; text-align: center;
        }
        .summary-table th { background: #f8f9fa; }
        .summary-ar { font-family: 'Amiri'; font-size: 32px; font-weight: bold; }

        .btn { 
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: #27ae60; color: white; border: none; padding: 12px 24px; 
            border-radius: 5px; cursor: pointer; font-weight: bold; font-family: sans-serif;
        }
    </style>
</head>
<body>

    <button class="btn no-print" onclick="window.print()">Print Full Workbook (PDF)</button>
    <div id="container"></div>

    <script>
        const alphabet = [
            { c: 'أ', m: 'അലിഫ്', ex: [{h:'أَ', w:'أَرْنَبٌ', e:'🐇'}, {h:'إِ', w:'إِبْرِيقٌ', e:'🍶'}, {h:'أُ', w:'أُذُنٌ', e:'👂'}, {h:'أْ', w:'رَأْسٌ', e:'👤'}] },
            { c: 'ب', m: 'ബാഅ്', ex: [{h:'بَ', w:'بَيْتٌ', e:'🏠'}, {h:'بِ', w:'بِنْتٌ', e:'👧'}, {h:'بُ', w:'بُرْتُقَالٌ', e:'🍊'}, {h:'بْ', w:'خُبْزٌ', e:'🍞'}] },
            { c: 'ت', m: 'താഅ്', ex: [{h:'تَ', w:'تُفَّاحٌ', e:'🍎'}, {h:'تِ', w:'تِمْسَاحٌ', e:'🐊'}, {h:'تُ', w:'تُرْمُسٌ', e:'☕'}, {h:'تْ', w:'بِنْتٌ', e:'👧'}] },
            { c: 'ث', m: 'ഥാഅ്', ex: [{h:'ثَ', w:'ثَوْبٌ', e:'👕'}, {h:'ثِ', w:'ثِيَابٌ', e:'👗'}, {h:'ثُ', w:'ثُعْبَانٌ', e:'🐍'}, {h:'ثْ', w:'إِثْنَانِ', e:'2️⃣'}] },
            { c: 'ج', m: 'ജീം', ex: [{h:'جَ', w:'جَمَلٌ', e:'🐪'}, {h:'جِ', w:'جِسْرٌ', e:'🌉'}, {h:'جُ', w:'جُبْنٌ', e:'🧀'}, {h:'جْ', w:'فَجْرٌ', e:'🌅'}] },
            { c: 'ح', m: 'ഹാഅ്', ex: [{h:'حَ', w:'حَمَامَةٌ', e:'🕊️'}, {h:'حِ', w:'حِصَانٌ', e:'🐎'}, {h:'حُ', w:'حُوتٌ', e:'🐳'}, {h:'حْ', w:'لَحْمٌ', e:'🥩'}] },
            { c: 'خ', m: 'ഖാഅ്', ex: [{h:'خَ', w:'خَرُوفٌ', e:'🐑'}, {h:'خِ', w:'خِمَارٌ', e:'🧕'}, {h:'خُ', w:'خُبْزٌ', e:'🍞'}, {h:'خْ', w:'نَخْلٌ', e:'🌴'}] },
            { c: 'د', m: 'ദാൽ', ex: [{h:'دَ', w:'دَرَّاجَةٌ', e:'🚲'}, {h:'دِ', w:'دِيكٌ', e:'🐓'}, {h:'دُ', w:'دُبٌّ', e:'🐻'}, {h:'دْ', w:'بَدْرٌ', e:'🌕'}] },
            { c: 'ذ', m: 'ദാൽ', ex: [{h:'ذَ', w:'ذَهَبٌ', e:'💰'}, {h:'ذِ', w:'ذِئْبٌ', e:'🐺'}, {h:'ذُ', w:'ذُرَةٌ', e:'🌽'}, {h:'ذْ', w:'جِذْعٌ', e:'🪵'}] },
            { c: 'ر', m: 'റാഅ്', ex: [{h:'رَ', w:'رَجُلٌ', e:'👨'}, {h:'رِ', w:'رِجْلٌ', e:'🦵'}, {h:'رُ', w:'رُمَّانٌ', e:'🍎'}, {h:'رْ', w:'بَرْدٌ', e:'❄️'}] },
            { c: 'ز', m: 'സാഅ്', ex: [{h:'زَ', w:'زَرَافَةٌ', e:'🦒'}, {h:'زِ', w:'زِيارَةٌ', e:'🤝'}, {h:'زُ', w:'زُهُورٌ', e:'💐'}, {h:'زْ', w:'مَزْرَعَةٌ', e:'🚜'}] },
            { c: 'س', m: 'സീൻ', ex: [{h:'سَ', w:'سَمَകَةٌ', e:'🐟'}, {h:'سِ', w:'സിക്കീൻ', e:'🔪'}, {h:'സُ', w:'സുലഹ്ഫാത്ത്', e:'🐢'}, {h:'സْ', w:'മസ്‍ജിദ്', e:'🕌'}] },
            { c: 'ش', m: 'ഷീൻ', ex: [{h:'شَ', w:'ഷംസ്', e:'☀️'}, {h:'ഷِ', w:'ഷിതാഅ്', e:'🌧️'}, {h:'ഷُ', w:'ഷുർത്വിയ്യ്', e:'👮'}, {h:'ഷْ', w:'മഷ്‍മിഷ്', e:'🍑'}] },
            { c: 'ص', m: 'സ്വാദ്', ex: [{h:'صَ', w:'സ്വഖ്ർ', e:'🦅'}, {h:'صِ', w:'സ്വിഫ്ർ', e:'0️⃣'}, {h:'صُ', w:'സ്വുന്ദൂഖ്', e:'📦'}, {h:'صْ', w:'ഖസ്വർ', e:'🏰'}] },
            { c: 'ض', m: 'ളാദ്', ex: [{h:'ضَ', w:'ളൗഅ്', e:'💡'}, {h:'ضِ', w:'ളർസ്', e:'🦷'}, {h:'ضُ', w:'ളഫ്ദഅ്', e:'🐸'}, {h:'ضْ', w:'മിള്‍റബ്', e:'🎾'}] },
            { c: 'ط', m: 'ത്വാഅ്', ex: [{h:'طَ', w:'ത്വബീബ്', e:'👨‍⚕️'}, {h:'طِ', w:'ത്വിഫ്ൽ', e:'👶'}, {h:'طُ', w:'ത്വുയൂർ', e:'🐦'}, {h:'طْ', w:'മത്ബഖ്', e:'🍳'}] },
            { c: 'ظ', m: 'ളാഅ്', ex: [{h:'ظَ', w:'ളർഫ്', e:'✉️'}, {h:'ظِ', w:'ളില്ല്', e:'👤'}, {h:'ظُ', w:'ളുഫുർ', e:'💅'}, {h:'ظْ', w:'മള്‍ലൂം', e:'⚖️'}] },
            { c: 'ع', m: 'ഐൻ', ex: [{h:'عَ', w:'ഐൻ', e:'👁️'}, {h:'عِ', w:'ഇനബ്', e:'🍇'}, {h:'عُ', w:'ഉസ്ഫൂർ', e:'🐦'}, {h:'عْ', w:'മൽഅബ്', e:'🏟️'}] },
            { c: 'غ', m: 'ഗൈൻ', ex: [{h:'غَ', w:'ഗസാൽ', e:'🦒'}, {h:'غِ', w:'ഗിതാഅ്', e:'🛏️'}, {h:'غُ', w:'ഗുറാബ്', e:'🐦'}, {h:'غْ', w:'മഗ്‌രിബ്', e:'🌇'}] },
            { c: 'ف', m: 'ഫാഅ്', ex: [{h:'فَ', w:'ഫറാശത്ത്', e:'🦋'}, {h:'فِ', w:'ഫീൽ', e:'🐘'}, {h:'فُ', w:'ഫുർഷാത്ത്', e:'🪥'}, {h:'فْ', w:'ളഫ്ദഅ്', e:'🐸'}] },
            { c: 'ق', m: 'ഖാഫ്', ex: [{h:'قَ', w:'ഖമർ', e:'🌙'}, {h:'قِ', w:'ഖിത്ത്വ്', e:'🐈'}, {h:'قُ', w:'ഖുബ്ബഅത്ത്', e:'👒'}, {h:'قْ', w:'സ്വഖ്ർ', e:'🦅'}] },
            { c: 'ك', m: 'കാഫ്', ex: [{h:'كَ', w:'കൽബ്', e:'🐕'}, {h:'كِ', w:'കിതാബ്', e:'📚'}, {h:'كُ', w:'കുറത്ത്', e:'⚽'}, {h:'كْ', w:'മക്തബ്', e:'📝'}] },
            { c: 'ل', m: 'ലാം', ex: [{h:'لَ', w:'ലയ്മൂൻ', e:'🍋'}, {h:'لِ', w:'ലിസാൻ', e:'👅'}, {h:'لُ', w:'ലുവ്ബത്ത്', e:'🧸'}, {h:'لْ', w:'മൽഅബ്', e:'🏟️'}] },
            { c: 'م', m: 'മീം', ex: [{h:'مَ', w:'മൗസ്', e:'🍌'}, {h:'مِ', w:'മിഖസ്സ്', e:'✂️'}, {h:'مُ', w:'മുഅല്ലിം', e:'👨‍🏫'}, {h:'مْ', w:'തമ്ർ', e:'🌴'}] },
            { c: 'ن', m: 'നൂൻ', ex: [{h:'نَ', w:'നഹ്‌ലത്ത്', e:'🐝'}, {h:'نِ', w:'നിസ്ർ', e:'🦅'}, {h:'نُ', w:'നുജൂം', e:'⭐'}, {h:'نْ', w:'ബിന്ത്', e:'👧'}] },
            { c: 'ه', m: 'ഹാഅ്', ex: [{h:'هَ', w:'ഹദിയ്യത്ത്', e:'🎁'}, {h:'هِ', w:'ഹിലാൽ', e:'🌙'}, {h:'هُ', w:'ഹുദ്ഹുദ്', e:'🐦'}, {h:'هْ', w:'ഫഹദ്', e:'🐆'}] },
            { c: 'و', m: 'വാവ്', ex: [{h:'وَ', w:'വർദത്ത്', e:'🌹'}, {h:'وِ', w:'വിസാം', e:'🏅'}, {h:'وُ', w:'വുളൂഅ്', e:'💧'}, {h:'وْ', w:'ലൗൻ', e:'🎨'}] },
            { c: 'ي', m: 'യാഅ്', ex: [{h:'يَ', w:'യദ്', e:'✋'}, {h:'يِ', w:'യസ്വീഹു', e:'📢'}, {h:'يُ', w:'യുസ്വല്ലി', e:'🕌'}, {h:'يْ', w:'ബൈത്ത്', e:'🏠'}] }
        ];

        const container = document.getElementById('container');

        alphabet.forEach(item => {
            const page = document.createElement('div');
            page.className = 'page';
            let gridHTML = '';
            item.ex.forEach(ex => {
                gridHTML += `<div class="card"><div class="label">${ex.h}</div><div class="emoji">${ex.e}</div><div class="word">${ex.w}</div></div>`;
            });
            page.innerHTML = `
                <div class="header-name">Ameen Azhari | Madrasa Hub</div>
                <div class="main-letter">${item.c}</div>
                <div class="trace-section">
                    <div style="text-align:right; font-family:sans-serif; font-size:14px; color:#666; margin-bottom:5px;">വരച്ചു പഠിക്കാം:</div>
                    <div class="dotted">${item.c} ${item.c} ${item.c}</div>
                </div>
                <div class="grid">${gridHTML}</div>
                <div class="lines">
                    <div style="text-align:right; font-family:sans-serif; font-size:14px; color:#666;">താഴെ എഴുതി പരിശീലിക്കാം:</div>
                    <div class="line"></div><div class="line"></div>
                </div>
            `;
            container.appendChild(page);
        });

        const summaryPage = document.createElement('div');
        summaryPage.className = 'page';
        let rows = '';
        for (let i = 0; i < alphabet.length; i += 2) {
            let col1 = alphabet[i];
            let col2 = alphabet[i+1] || {c:'', m:''};
            rows += `
                <tr>
                    <td class="summary-ar">${col1.c}</td><td>${col1.m}</td>
                    <td class="summary-ar">${col2.c}</td><td>${col2.m}</td>
                </tr>
            `;
        }
        summaryPage.innerHTML = `
            <div class="header-name">Ameen Azhari | Madrasa Hub</div>
            <h2 style="font-family:sans-serif; margin-bottom:30px;">അറബിക് അക്ഷരമാല - മലയാളം ഉച്ചാരണം</h2>
            <table class="summary-table">
                <thead><tr><th>അക്ഷരം</th><th>മലയാളം</th><th>അക്ഷരം</th><th>മലയാളം</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
            <div style="margin-top:auto; font-family:sans-serif; color:#888;">Madrasa Digital Learning Hub - 2026</div>
        `;
        container.appendChild(summaryPage);
    </script>
</body>
</html>
