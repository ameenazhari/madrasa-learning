<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Arabic Full Workbook - Ameen Azhari</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none; }
            .page { 
                page-break-after: always; 
                margin: 0 !important; 
                border: none !important;
                box-shadow: none !important;
            }
        }
        body { 
            font-family: 'Amiri', serif; 
            direction: rtl; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
            background: #f4f7f6; 
        }
        .page {
            background: white;
            width: 210mm;
            min-height: 290mm;
            margin: 20px auto;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
        }
        .header-name {
            text-align: left; font-size: 12px; color: #999;
            font-family: sans-serif; margin-bottom: 10px;
        }
        .main-letter {
            font-size: 160px; color: #d32f2f; margin: 0; line-height: 1.1;
        }
        .trace-section {
            border: 2px dashed #eee; background: #fafafa;
            padding: 20px; border-radius: 15px; margin: 15px 0;
        }
        .dotted { font-size: 80px; color: #e0e0e0; letter-spacing: 25px; }
        .grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 20px; margin-top: 10px; flex-grow: 1;
        }
        .card {
            border: 1px solid #f0f0f0; border-radius: 12px;
            padding: 15px; background: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .label { 
            font-size: 45px; color: #1e88e5; background: #e3f2fd; 
            width: 100%; border-radius: 8px; margin-bottom: 10px;
        }
        .emoji { font-size: 50px; }
        .word { font-size: 32px; font-weight: bold; }
        .lines { margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
        .line { height: 45px; border-bottom: 2px solid #333; margin: 10px 0; }
        
        /* ലാസ്റ്റ് പേജ് ടേബിൾ സ്റ്റൈൽ */
        .summary-table {
            width: 100%; border-collapse: collapse; margin-top: 20px;
            direction: ltr; font-family: sans-serif;
        }
        .summary-table th, .summary-table td {
            border: 1px solid #ddd; padding: 12px; text-align: center;
        }
        .summary-table th { background: #f8f9fa; }
        .summary-ar { font-family: 'Amiri'; font-size: 30px; }

        .btn { 
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: #27ae60; color: white; border: none; padding: 12px 24px; 
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <button class="btn no-print" onclick="window.print()">Print Full Workbook (PDF)</button>
    <div id="container"></div>

    <script>
        const alphabet = [
            { c: 'أ', m: 'അലിഫ്', ex: [{h:'أَ', w:'أَرْنَبٌ', e:'🐇'}, {h:'إِ', w:'إِبْرِيقٌ', e:'🍶'}, {h:'أُ', w:'أُذُنٌ', e:'👂'}, {h:'أْ', w:'رَأْسٌ', e:'👤'}] },
            { c: 'ب', m: 'ബാഅ്', ex: [{h:'بَ', w:'بَيْتٌ', e:'🏠'}, {h:'بِ', w:'بِنْتٌ', e:'👧'}, {h:'بُ', w:'بُرْتُقَالٌ', e:'🍊'}, {h:'بْ', w:'خُبْزٌ', e:'🍞'}] },
            { c: 'ت', m: 'താഅ്', ex: [{h:'تَ', w:'تُفَّاحٌ', e:'🍎'}, {h:'تِ', w:'تِمْسَاحٌ', e:'🐊'}, {h:'تُ', w:'تُرْمُسٌ', e:'☕'}, {h:'تْ', w:'بِنْتٌ', e:'👧'}] },
            { c: 'ث', m: 'ഥാഅ്', ex: [{h:'ثَ', w:'ثَوْبٌ', e:'👕'}, {h:'ثِ', w:'ثِيَابٌ', e:'👗'}, {h:'ثُ', w:'ثُعْبَانٌ', e:'🐍'}, {h:'ثْ', w:'إِثْنَانِ', e:'2️⃣'}] },
            { c: 'ج', m: 'ജീം', ex: [{h:'جَ', w:'جَمَلٌ', e:'🐪'}, {h:'جِ', w:'جِسْرٌ', e:'🌉'}, {h:'جُ', w:'جُبْنٌ', e:'🧀'}, {h:'جْ', w:'فَجْرٌ', e:'🌅'}] },
            { c: 'ح', m: 'ഹാഅ്', ex: [{h:'حَ', w:'حَمَامَةٌ', e:'🕊️'}, {h:'حِ', w:'حِصَانٌ', e:'🐎'}, {h:'حُ', w:'حُوتٌ', e:'🐳'}, {h:'حْ', w:'لَحْمٌ', e:'🥩'}] },
            { c: 'خ', m: 'ഖാഅ്', ex: [{h:'خَ', w:'خَرُوفٌ', e:'🐑'}, {h:'خِ', w:'خِمَارٌ', e:'🧕'}, {h:'خُ', w:'خُبْزٌ', e:'🍞'}, {h:'خْ', w:'نَخْلٌ', e:'🌴'}] },
            { c: 'د', m: 'ദാൽ', ex: [{h:'دَ', w:'دَرَّاجَةٌ', e:'🚲'}, {h:'دِ', w:'دِيكٌ', e:'🐓'}, {h:'دُ', w:'دُبٌّ', e:'🐻'}, {h:'دْ', w:'بَدْرٌ', e:'🌕'}] },
            { c: 'ذ', m: 'ദാൽ', ex: [{h:'ذَ', w:'ذَهَبٌ', e:'💰'}, {h:'ذِ', w:'ذِئْبٌ', e:'🐺'}, {h:'ذُ', w:'ذُرَةٌ', e:'🌽'}, {h:'ذْ', w:'جِذْعٌ', e:'🪵'}] },
            { c: 'ر', m: 'റാഅ്', ex: [{h:'رَ', w:'رَجُلٌ', e:'👨'}, {h:'رِ', w:'رِجْلٌ', e:'🦵'}, {h:'رُ', w:'رُمَّانٌ', e:'🍎'}, {h:'رْ', w:'بَرْدٌ', e:'❄️'}] },
            { c: 'ز', m: 'സാഅ്', ex: [{h:'زَ', w:'زَرَافَةٌ', e:'🦒'}, {h:'زِ', w:'زِيارَةٌ', e:'🤝'}, {h:'زُ', w:'زُهُورٌ', e:'💐'}, {h:'زْ', w:'مَزْرَعَةٌ', e:'🚜'}] },
            { c: 'س', m: 'സീൻ', ex: [{h:'سَ', w:'سَمَكَةٌ', e:'🐟'}, {h:'سِ', w:'سِكِّينٌ', e:'🔪'}, {h:'سُ', w:'سُلَحْفَاةٌ', e:'🐢'}, {h:'سْ', w:'مَسْجِدٌ', e:'🕌'}] },
            { c: 'ش', m: 'ഷീൻ', ex: [{h:'شَ', w:'شَمْسٌ', e:'☀️'}, {h:'شِ', w:'شِتَاءٌ', e:'🌧️'}, {h:'شُ', w:'شُرْطِيٌّ', e:'👮'}, {h:'شْ', w:'مَشْمِشٌ', e:'🍑'}] },
            { c: 'ص', m: 'സ്വാദ്', ex: [{h:'صَ', w:'صَقْرٌ', e:'🦅'}, {h:'صِ', w:'صِفْرٌ', e:'0️⃣'}, {h:'صُ', w:'صُنْدُوقٌ', e:'📦'}, {h:'صْ', w:'قَصْرٌ', e:'🏰'}] },
            { c: 'ض', m: 'ളാദ്', ex: [{h:'ضَ', w:'ضَوْءٌ', e:'💡'}, {h:'ضِ', w:'ضِرْسٌ', e:'🦷'}, {h:'ضُ', w:'ضُفْدَعٌ', e:'🐸'}, {h:'ضْ', w:'مِضْرَبٌ', e:'🎾'}] },
            { c: 'ط', m: 'ത്വാഅ്', ex: [{h:'طَ', w:'طَبﻴﺐٌ', e:'👨‍⚕️'}, {h:'طِ', w:'طِفْلٌ', e:'👶'}, {h:'طُ', w:'طُيُورٌ', e:'🐦'}, {h:'طْ', w:'مَطْبَخٌ', e:'🍳'}] },
            { c: 'ظ', m: 'ളാഅ്', ex: [{h:'ظَ', w:'ظَرْفٌ', e:'✉️'}, {h:'ظِ', w:'ظِلٌّ', e:'👤'}, {h:'ظُ', w:'ظُفُرٌ', e:'💅'}, {h:'ظْ', w:'مَظْلُومٌ', e:'⚖️'}] },
            { c: 'ع', m: 'ഐൻ', ex: [{h:'عَ', w:'عَيْنٌ', e:'👁️'}, {h:'عِ', w:'عِنَبٌ', e:'🍇'}, {h:'عُ', w:'عُصْفُورٌ', e:'🐦'}, {h:'عْ', w:'مَلْعَبٌ', e:'🏟️'}] },
            { c: 'غ', m: 'ഗൈൻ', ex: [{h:'غَ', w:'غَزَالٌ', e:'🦒'}, {h:'غِ', w:'غِطاءٌ', e:'🛏️'}, {h:'غُ', w:'غُرَابٌ', e:'🐦'}, {h:'غْ', w:'مَغْرِبٌ', e:'🌇'}] },
            { c: 'ف', m: 'ഫാഅ്', ex: [{h:'فَ', w:'فَرَاشَةٌ', e:'🦋'}, {h:'فِ', w:'فِيلٌ', e:'🐘'}, {h:'فُ', w:'فُرْشَاةٌ', e:'🪥'}, {h:'فْ', w:'ضِفْدَعٌ', e:'🐸'}] },
            { c: 'ق', m: 'ഖാഫ്', ex: [{h:'قَ', w:'قَمَرٌ', e:'🌙'}, {h:'قِ', w:'قِطٌّ', e:'🐈'}, {h:'قُ', w:'قُبَّعَةٌ', e:'👒'}, {h:'قْ', w:'صَقْرٌ', e:'🦅'}] },
            { c: 'ك', m: 'കാഫ്', ex: [{h:'كَ', w:'كَلْبٌ', e:'🐕'}, {h:'كِ', w:'كِتَابٌ', e:'📚'}, {h:'كُ', w:'كُرَةٌ', e:'⚽'}, {h:'كْ', w:'مَكْتَبٌ', e:'📝'}] },
            { c: 'ل', m: 'ലാം', ex: [{h:'لَ', w:'لَيْمُونٌ', e:'🍋'}, {h:'لِ', w:'لِسَانٌ', e:'👅'}, {h:'لُ', w:'لُعْبَةٌ', e:'🧸'}, {h:'لْ', w:'مَلْعَبٌ', e:'🏟️'}] },
            { c: 'م', m: 'മീം', ex: [{h:'مَ', w:'مَوْزٌ', e:'🍌'}, {h:'مِ', w:'مِقَصٌّ', e:'✂️'}, {h:'مُ', w:'مُعَلِّمٌ', e:'👨‍🏫'}, {h:'مْ', w:'تَمْرٌ', e:'🌴'}] },
            { c: 'ن', m: 'നൂൻ', ex: [{h:'نَ', w:'نَحْلَةٌ', e:'🐝'}, {h:'نِ', w:'نِسْرٌ', e:'🦅'}, {h:'نُ', w:'نُجُومٌ', e:'⭐'}, {h:'نْ', w:'بِنْتٌ', e:'👧'}] },
            { c: 'ه', m: 'ഹാഅ്', ex: [{h:'هَ', w:'هَدِيَّةٌ', e:'🎁'}, {h:'هِ', w:'هِلالٌ', e:'🌙'}, {h:'هُ', w:'هُدْهُدٌ', e:'🐦'}, {h:'هْ', w:'فَهْدٌ', e:'🐆'}] },
            { c: 'و', m: 'വാവ്', ex: [{h:'وَ', w:'وَرْدَةٌ', e:'🌹'}, {h:'وِ', w:'وِسامٌ', e:'🏅'}, {h:'وُ', w:'وُضُوءٌ', e:'💧'}, {h:'وْ', w:'لَوْنٌ', e:'🎨'}] },
            { c: 'ي', m: 'യാഅ്', ex: [{h:'يَ', w:'يَدٌ', e:'✋'}, {h:'يِ', w:'يَصِيحُ', e:'📢'}, {h:'يُ', w:'يُصَلِّي', e:'🕌'}, {h:'يْ', w:'بَيْتٌ', e:'🏠'}] }
        ];

        const container = document.getElementById('container');

        // അക്ഷരങ്ങളുടെ പേജുകൾ നിർമ്മിക്കുന്നു
        alphabet.forEach(item => {
            const page = document.createElement('div');
            page.className = 'page';
            let gridHTML = '';
            item.ex.forEach(ex => {
                gridHTML += `<div class="card"><div class="label">${ex.h}</div><div class="emoji">${ex.e}</div><div class="word">${ex.w}</div></div>`;
            });
            page.innerHTML = `
                <div class="header-name">Ameen Azhari | Madrasa Hub</div>
                <div class="main-letter">${item.c}</div>
                <div class="trace-section">
                    <div style="text-align:right; font-family:sans-serif; font-size:14px; color:#666; margin-bottom:5px;">വരച്ചു പഠിക്കാം:</div>
                    <div class="dotted">${item.c} ${item.c} ${item.c}</div>
                </div>
                <div class="grid">${gridHTML}</div>
                <div class="lines">
                    <div style="text-align:right; font-family:sans-serif; font-size:14px; color:#666;">താഴെ എഴുതി പരിശീലിക്കാം:</div>
                    <div class="line"></div><div class="line"></div>
                </div>
            `;
            container.appendChild(page);
        });

        // അവസാനത്തെ സമ്മറി പേജ്
        const summaryPage = document.createElement('div');
        summaryPage.className = 'page';
        let rows = '';
        for (let i = 0; i < alphabet.length; i += 2) {
            let col1 = alphabet[i];
            let col2 = alphabet[i+1] || {c:'', m:''};
            rows += `
                <tr>
                    <td class="summary-ar">${col1.c}</td><td>${col1.m}</td>
                    <td class="summary-ar">${col2.c}</td><td>${col2.m}</td>
                </tr>
            `;
        }
        summaryPage.innerHTML = `
            <div class="header-name">Ameen Azhari | Madrasa Hub</div>
            <h2 style="font-family:sans-serif;">അറബിക് അക്ഷരമാല - മലയാളം ഉച്ചാരണം</h2>
            <table class="summary-table">
                <thead><tr><th>അക്ഷരം</th><th>മലയാളം</th><th>അക്ഷരം</th><th>മലയാളം</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
            <div style="margin-top:auto; font-family:sans-serif; color:#888;">Madrasa Digital Learning Hub - 2026</div>
        `;
        container.appendChild(summaryPage);
    </script>
</body>
</html>
