<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>അറബിക് പാഠപുസ്തകം - ഫുൾ കോഴ്സ്</title>
    <style>
        body { 
            text-align: center; 
            background-color: #f4f7f6; 
            direction: rtl; 
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 10px;
        }
        .header { 
            background: #1e88e5; 
            color: white; 
            padding: 15px; 
            border-radius: 0 0 20px 20px;
            margin-bottom: 20px;
            direction: ltr;
        }
        #start-btn {
            background: #ff9800;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 4px solid #ddd;
        }
        .card:active { transform: scale(0.95); background: #e3f2fd; }
        .big-letter { font-size: 60px; color: #d32f2f; margin: 0; }
        .emoji { font-size: 40px; margin: 5px 0; }
        .word { font-size: 24px; font-weight: bold; color: #333; margin: 5px 0; }
        .meaning { font-size: 14px; color: #777; direction: ltr; }
    </style>
</head>
<body>

    <div class="header">
        <h1>അറബിക് പാഠപുസ്തകം</h1>
        <p>മുഴുവൻ അക്ഷരങ്ങളും ശബ്ദത്തോടൊപ്പം</p>
    </div>

    <button id="start-btn" onclick="initAudio()">പഠനം തുടങ്ങാം (Click to Start Audio)</button>

    <div class="grid" id="mainGrid"></div>

    <script>
        // മുഴുവൻ അക്ഷരങ്ങളുടെയും ലിസ്റ്റ്
        const fullLesson = [
            { c: 'أ', w: 'أَرْنَبٌ', m: 'Rabbit', e: '🐇' },
            { c: 'ب', w: 'بَيْتٌ', m: 'House', e: '🏠' },
            { c: 'ت', w: 'تُفَّاحٌ', m: 'Apple', e: '🍎' },
            { c: 'ث', w: 'ثَوْبٌ', m: 'Dress', e: '👕' },
            { c: 'ج', w: 'جَمَلٌ', m: 'Camel', e: '🐪' },
            { c: 'ح', w: 'حِصَانٌ', m: 'Horse', e: '🐎' },
            { c: 'خ', w: 'خُبْزٌ', m: 'Bread', e: '🍞' },
            { c: 'د', w: 'دِيكٌ', m: 'Rooster', e: '🐓' },
            { c: 'ذ', w: 'ذُرَةٌ', m: 'Corn', e: '🌽' },
            { c: 'ر', w: 'رُمَّانٌ', m: 'Pomegranate', e: '🍎' },
            { c: 'ز', w: 'زَهْرَةٌ', m: 'Flower', e: '🌸' },
            { c: 'س', w: 'سَمَكٌ', m: 'Fish', e: '🐟' },
            { c: 'ش', w: 'شَمْسٌ', m: 'Sun', e: '☀️' },
            { c: 'ص', w: 'صَقْرٌ', m: 'Falcon', e: '🦅' },
            { c: 'ض', w: 'ضِفْدَعٌ', m: 'Frog', e: '🐸' },
            { c: 'ط', w: 'طَيَّارَةٌ', m: 'Airplane', e: '✈️' },
            { c: 'ظ', w: 'ظَبْيٌ', m: 'Deer', e: '🦌' },
            { c: 'ع', w: 'عَيْنٌ', m: 'Eye', e: '👁️' },
            { c: 'غ', w: 'غَزَالٌ', m: 'Gazelle', e: '🦌' },
            { c: 'ف', w: 'فِيلٌ', m: 'Elephant', e: '🐘' },
            { c: 'ق', w: 'قِطٌّ', m: 'Cat', e: '🐈' },
            { c: 'ك', w: 'كَلْبٌ', m: 'Dog', e: '🐕' },
            { c: 'ل', w: 'لَيْمُونٌ', m: 'Lemon', e: '🍋' },
            { c: 'م', w: 'مَوْزٌ', m: 'Banana', e: '🍌' },
            { c: 'ن', w: 'نَجْمَةٌ', m: 'Star', e: '⭐' },
            { c: 'ه', w: 'هِلالٌ', m: 'Crescent', e: '🌙' },
            { c: 'و', w: 'وَرْدَةٌ', m: 'Rose', e: '🌹' },
            { c: 'ي', w: 'يَدٌ', m: 'Hand', e: '✋' }
        ];

        function initAudio() {
            window.speechSynthesis.getVoices();
            document.getElementById('start-btn').style.display = 'none';
        }

        const grid = document.getElementById('mainGrid');
        fullLesson.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <p class="big-letter">${item.c}</p>
                <div class="emoji">${item.e}</div>
                <p class="word">${item.w}</p>
                <p class="meaning">${item.m}</p>
            `;
            card.onclick = () => speak(`${item.c}, ${item.w}`);
            grid.appendChild(card);
        });

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            msg.rate = 0.7;
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
